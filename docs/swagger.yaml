      - description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helper.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.Response'
      security:
      - BearerAuth: []
      summary: Get all dermaga
      tags:
      - dermaga
    post:
      consumes:
      - application/json
      description: Create a new dermaga record
      parameters:
      - description: Dermaga payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dermaga.DermagaRequest'
      produces:
      - application/json
      responses:
        "201":
