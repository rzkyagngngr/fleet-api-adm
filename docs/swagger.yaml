          description: OK
          schema:
            $ref: '#/definitions/helper.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.Response'
      security:
      - BearerAuth: []
      summary: Get dermaga by id
      tags:
      - dermaga
    put:
      consumes:
      - application/json
      description: Update dermaga by id
      parameters:
      - description: Dermaga ID
        in: path
        name: id
        required: true
        type: integer
      - description: Dermaga payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dermaga.DermagaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helper.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/helper.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.Response'
      security:
      - BearerAuth: []
      summary: Update dermaga
      tags:
      - dermaga
  /master/menus:
