basePath: /api/v1
definitions:
  access.Access:
    properties:
      access_id:
        type: integer
      application_id:
        type: integer
      can_delete:
        type: integer
      can_insert:
        type: integer
      can_update:
        type: integer
      creation_by:
        type: integer
      creation_date:
        type: string
      last_update_by:
        type: integer
      last_update_date:
        type: string
      menu_icon:
        type: string
      menu_id:
        type: integer
      menu_order:
        type: integer
      menu_text:
        type: string
      menu_url:
        type: string
      parent_menu_id:
        type: integer
      roles_id:
        type: integer
      status:
        type: integer
    type: object
  auth.ChangeTerminalRequest:
    properties:
      branch_code:
        type: integer
      terminal_code:
        type: integer
    required:
    - branch_code
    - terminal_code
    type: object
  auth.LoginRequest:
    properties:
      employee_id:
        type: string
      password:
        type: string
    required:
    - employee_id
    - password
    type: object
  auth.UserRegisterRequest:
    properties:
      branch_code:
        type: integer
      branch_name:
        type: string
      company_code:
        type: string
      email:
        type: string
      employee_id:
        type: string
      full_name:
        type: string
      job_title:
        type: string
      password:
        minLength: 6
        type: string
      personnel_area:
        type: string
      personnel_sub_area:
        type: string
      phone_number:
        type: string
      sub_unit_name:
        type: string
      terminal_code:
        type: integer
    required:
    - email
    - employee_id
    - full_name
    - password
    type: object
  dermaga.DermagaRequest:
    properties:
      kd_dermaga:
        type: string
      keterangan:
        type: string
      nm_dermaga:
        type: string
      posisi_akhir:
        type: integer
      posisi_awal:
        type: integer
      status:
        type: string
    type: object
  helper.DownloadQuery:
    properties:
      is_download:
        type: boolean
      range_end:
        type: integer
      range_start:
        type: integer
      type:
        type: string
    type: object
  helper.MetaResponse:
    properties:
      data: {}
      message:
        type: string
      meta: {}
      success:
        type: boolean
    type: object
  helper.PaginatedResponse:
    properties:
      data: {}
      limit:
        type: integer
      message:
        type: string
      page:
        type: integer
      success:
        type: boolean
      total:
        type: integer
    type: object
  helper.Response:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  helper.SortQuery:
    properties:
      by:
        type: string
      order:
        type: string
    type: object
  menu.Menu:
    properties:
      application_id:
        type: integer
      creation_by:
        type: string
      creation_date:
        type: string
      id:
        type: integer
      last_updated_by:
        type: string
      last_updated_date:
        type: string
      menu_code:
        type: string
      menu_desc:
        type: string
      menu_header_id:
        type: integer
      menu_icon:
        type: string
      menu_level:
        type: integer
      menu_order:
        type: integer
      menu_status:
        type: integer
      menu_text:
        type: string
      menu_url:
        type: string
      parent_menu_id:
        type: integer
    type: object
  menu.SearchMenusRequest:
    properties:
      download:
        $ref: '#/definitions/helper.DownloadQuery'
      filters:
        additionalProperties:
          type: string
        type: object
      limit:
        type: integer
      page:
        type: integer
      search:
        type: string
      sort:
        $ref: '#/definitions/helper.SortQuery'
    type: object
  reference.PosmReference:
    properties:
      branch_code:
        type: integer
      creation_by:
        type: string
      creation_date:
        type: string
      details:
        items:
          $ref: '#/definitions/reference.PosmReferenceD'
        type: array
      id:
        type: integer
      id_ref_file:
        type: string
      id_table:
        type: string
      kd_aktif:
        type: string
      keterangan:
        type: string
      last_updated_by:
        type: string
      last_updated_date:
        type: string
      level_akses:
        type: string
      program_name:
        type: string
      ref1:
        type: string
      terminal_code:
        type: integer
      val1:
        type: integer
    type: object
  reference.PosmReferenceD:
    properties:
      branch_code:
        type: integer
      creation_by:
        type: string
      creation_date:
        type: string
      id:
        type: integer
      id_ref_file:
        type: string
      id_ref_key:
        type: string
      id_table:
        type: string
      kd_aktif:
        type: string
      ket_ref_data:
        type: string
      last_updated_by:
        type: string
      last_updated_date:
        type: string
      level_akses:
        type: string
      program_name:
        type: string
      rc:
        type: integer
      ref1:
        type: string
      ref2:
        type: string
      ref3:
        type: string
      ref4:
        type: string
      ref5:
        type: string
      terminal_code:
        type: integer
      val1:
        type: integer
      val2:
        type: integer
      val3:
        type: integer
      val4:
        type: integer
      val5:
        type: integer
    type: object
  role.Role:
    properties:
      application_id:
        type: integer
      application_nama:
        type: string
      creation_by:
        type: integer
      creation_date:
        type: string
      default_menu_url:
        type: string
      hak_akses_id:
        type: integer
      hak_akses_nama:
        type: string
      hak_akses_super:
        type: boolean
      last_update_by:
        type: integer
      last_update_date:
        type: string
      status:
        type: integer
    type: object
info:
  contact: {}
  description: API for Omniport administration backend.
  title: Omniport API
  version: "1.0"
paths:
  /auth/change-terminal:
    post:
      consumes:
      - application/json
      description: Change branch and terminal for current authenticated user
      parameters:
      - description: Change terminal payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.ChangeTerminalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helper.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.Response'
      security:
      - BearerAuth: []
      summary: Change terminal
      tags:
      - auth
  /auth/login:
    post:
      consumes:
