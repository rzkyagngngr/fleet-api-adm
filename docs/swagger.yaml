      tags:
      - dermaga
  /dermaga/{id}:
    delete:
      description: Delete dermaga by id
      parameters:
      - description: Dermaga ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helper.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/helper.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.Response'
      security:
      - BearerAuth: []
      summary: Delete dermaga
      tags:
      - dermaga
    get:
      description: Retrieve dermaga detail by id
      parameters:
      - description: Dermaga ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
